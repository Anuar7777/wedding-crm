# Copy .env.example to .env and set every variable. Compose does not substitute defaults.

services:
  postgres:
    image: postgres:16-alpine
    container_name: event-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${WEDDING_CRM_IMAGE_REGISTRY}/wedding-crm-backend:${WEDDING_CRM_IMAGE_TAG}
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    container_name: wedding-crm-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      CORS_ORIGIN: ${CORS_ORIGIN}
      LOG_LEVEL: ${LOG_LEVEL}
      LOG_STACK: ${LOG_STACK}
      LOG_BODY: ${LOG_BODY}
      LOG_4XX: ${LOG_4XX}
      PG_POOL_MAX: ${PG_POOL_MAX}
      TRUST_PROXY: ${TRUST_PROXY}
      SEED_SUPERADMIN_EMAIL: ${SEED_SUPERADMIN_EMAIL}
      SEED_SUPERADMIN_PASSWORD: ${SEED_SUPERADMIN_PASSWORD}
      DEFAULT_RESET_PASSWORD: ${DEFAULT_RESET_PASSWORD}
    ports:
      - '${BACKEND_PORT}:3000'

  frontend:
    image: node:22-alpine
    container_name: wedding-crm-frontend-dev
    restart: 'no'
    depends_on:
      - backend
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      WATCHPACK_POLLING: 'true'
    command: sh -c "corepack enable && yarn install --frozen-lockfile && yarn workspace frontend dev"
    ports:
      - '${FRONTEND_PORT}:3000'
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
      - root_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
  root_node_modules:
