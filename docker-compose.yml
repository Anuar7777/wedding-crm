services:
  db:
    image: postgres:16-alpine
    container_name: wedding-crm-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-event_crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-event_crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-event_crm_db}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-event_crm_user} -d
          ${POSTGRES_DB:-event_crm_db}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${WEDDING_CRM_IMAGE_REGISTRY:-wedding-crm.local}/wedding-crm-backend:${WEDDING_CRM_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    container_name: wedding-crm-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-your-telegram-bot-token}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      LOG_LEVEL: ${LOG_LEVEL:-log,warn,error,debug}
      LOG_STACK: ${LOG_STACK:-true}
      LOG_BODY: ${LOG_BODY:-false}
      LOG_4XX: ${LOG_4XX:-true}
    ports:
      - '${BACKEND_PORT:-3000}:3000'

  frontend:
    image: ${WEDDING_CRM_IMAGE_REGISTRY:-wedding-crm.local}/wedding-crm-frontend:${WEDDING_CRM_IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    container_name: wedding-crm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - '${FRONTEND_PORT:-3001}:3000'

volumes:
  postgres_data:
